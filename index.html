<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Huy Reader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3502/3502460.png">
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <h1>📚 Kho Truyện Của Tôi</h1>
            <div class="input-group">
                <input type="text" id="story-title" placeholder="Tên chương truyện...">
                <textarea id="story-content" placeholder="Dán nội dung truyện vào đây..."></textarea>
                <button id="btn-save">Lưu Vào Máy</button>
            </div>
            <hr>
            <ul id="story-list"></ul>
        </div>

        <div id="reader-screen" class="hidden">
    <div id="reader-controls">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
            <button class="btn-back" id="btn-back" style="width: 100px; margin: 0;">⬅ Quay lại</button>
            <div style="flex: 1; background: #1c1c1e; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px;">
                <span id="font-size-val" style="font-size: 12px; min-width: 30px;">19px</span>
                <input type="range" id="font-slider" min="14" max="40" value="19" style="flex: 1;">
            </div>
        </div>
    </div>

    <h2 id="display-title"></h2>
    <div id="display-content"></div>

    <div class="audio-controls">
        <button id="btn-play" style="width: 80px; height: 80px; border-radius: 50%; font-size: 30px;">▶️</button>
        <button id="btn-stop" style="display: none;">🛑</button> 
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
