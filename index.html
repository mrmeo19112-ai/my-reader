<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Huy Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <h1>📚 Kho Truyện Của Tôi</h1>
            
            <input type="text" id="search-box" placeholder="🔍 Tìm kiếm chương truyện (VD: Chương 10)..." style="margin-bottom: 20px; background: #2c2c2e; border: 1px solid #48484a;">

            <div class="input-group">
                <input type="text" id="story-title" placeholder="Tên chương truyện...">
                <textarea id="story-content" placeholder="Dán nội dung truyện vào đây..."></textarea>
                <button id="btn-save">Lưu Vào Máy</button>
            </div>
            <hr style="border-color: #333; margin: 20px 0;">
            <ul id="story-list"></ul>
        </div>

        <div id="reader-screen" class="hidden">
            <div id="reader-controls" style="display: flex; align-items: center; gap: 15px;">
                <button id="btn-back">⬅</button>
                <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" style="flex: 1; margin: 0;">
            </div>

            <h2 id="display-title"></h2>
            <div id="display-content"></div>

            <div class="audio-controls">
                <button id="btn-play">▶️</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
